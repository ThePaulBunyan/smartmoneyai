<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} - SmartTech Solutions</title>
  <meta name="description" content="Professional IT Support & AI Solutions for Small Businesses">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="site-header">
    <div class="site-logo">SmartTech<span>Solutions</span></div>
  </div>
  
  <nav class="banner">
    <div class="banner-inner">
      <div class="banner-links">
        <a href="/" class="banner-btn {% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="/about/" class="banner-btn {% if page.url == '/about/' %}active{% endif %}">About Us</a>
        <a href="/services/" class="banner-btn {% if page.url == '/services/' %}active{% endif %}">Services</a>
        <a href="/contact/" class="banner-btn {% if page.url == '/contact/' %}active{% endif %}">Contact Us</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">
        <h3>SmartTech Solutions</h3>
        <p>Professional IT Support & AI for Small Business</p>
      </div>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/about/">About Us</a>
        <a href="/services/">Services</a>
        <a href="/contact/">Contact Us</a>
      </div>
      <p class="copyright">© 2026 SmartTech Solutions. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
